<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Double Pendulum — Results Gallery</title><style>
 :root{--face:#d4d0c8;--face2:#cbc7bd;--lite:#ffffff;--dark:#808080;--vdark:#404040;--accent:#2c5d57;--ink:#1b1b1b}
 *{box-sizing:border-box}
 body{margin:0;padding:24px;font:13px/1.5 Tahoma,"MS Sans Serif",Geneva,Verdana,sans-serif;color:var(--ink);background:#3c4448}
 .app{max-width:1320px;margin:0 auto;background:var(--face);border:2px solid;border-color:var(--lite) var(--vdark) var(--vdark) var(--lite);padding:3px}
 .hdr{background:var(--accent);color:#eef3f1;padding:7px 11px;border:2px solid;border-color:#4f857e #163230 #163230 #4f857e}
 .hdr .name{font-weight:bold;font-size:15px;letter-spacing:.04em}
 .hdr .home{float:right;font-size:12px;color:#cfe1dd;text-decoration:none;font-weight:bold}
 .hdr .home:hover{color:#fff;text-decoration:underline}
 .hdr .sub{font-size:12px;color:#bcd2ce;margin-top:2px}
 .body{padding:9px}
 fieldset{border:2px groove var(--face);margin:0 0 9px;padding:7px 10px;background:var(--face)}
 legend{font-weight:bold;color:var(--accent);padding:0 5px}
 .row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin:3px 0}
 .row b.lbl{width:46px;color:#333}
 button{font:11px Tahoma,"MS Sans Serif",sans-serif;color:#000;cursor:pointer;padding:3px 11px;margin:1px;
  border:2px solid;border-color:var(--lite) var(--vdark) var(--vdark) var(--lite);background:var(--face)}
 button:hover{background:var(--face2)}
 button:active,button.on{border-color:var(--vdark) var(--lite) var(--lite) var(--vdark);background:var(--face2);box-shadow:inset 1px 1px 2px rgba(0,0,0,.25)}
 button.on{font-weight:bold;color:var(--accent)}
 #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:2px}
 .card{background:var(--face);padding:2px;cursor:pointer;border:1px solid var(--dark)}
 .card:hover{background:var(--face2)}
 .card.arc{border:2px solid var(--accent)}
 .arctag{position:absolute;left:4px;top:4px;font-size:10px;font-weight:bold;padding:1px 7px;color:#eef3f1;background:rgba(44,93,87,.92);border:1px solid #163230;pointer-events:none}
 .arcdot{position:absolute;left:4px;top:4px;font-size:10px;padding:0 5px;color:#06402b;background:#bfe6c2;border:1px solid #06402b;pointer-events:none}
 .card .frame{position:relative;border:1px solid var(--vdark);background:#fff;overflow:hidden}
 .card .frame img{width:100%;display:block}
 .card .frame .gif{position:absolute;inset:0;display:none}
 .card.play .gif{display:block}
 .card .play-tag{position:absolute;right:4px;top:4px;font-size:11px;padding:1px 6px;color:#eef3f1;background:rgba(44,93,87,.85);border:1px solid #163230;pointer-events:none}
 .card.play .play-tag{display:none}
 .meta{margin-top:3px;color:#222}
 .meta .phase{color:var(--accent);font-weight:bold;font-size:11px;letter-spacing:.02em;text-transform:uppercase}
 .nums{color:#444;font-size:13px;margin-top:2px;font-family:"Courier New",monospace}
 .status{display:flex;gap:5px;margin-top:3px;padding:2px}
 .status span{border:2px solid;border-color:var(--dark) var(--lite) var(--lite) var(--dark);background:var(--face);padding:2px 9px;color:#333}
 .status .grow{flex:1}
 #lb{position:fixed;inset:0;background:rgba(10,14,16,.6);display:none;align-items:center;justify-content:center;z-index:20}
 .dlg{background:var(--face);max-width:94vw;max-height:94vh;display:flex;flex-direction:column;padding:3px;
  border:2px solid;border-color:var(--lite) var(--vdark) var(--vdark) var(--lite);box-shadow:0 10px 34px rgba(0,0,0,.55)}
 .dlg .bar{background:var(--accent);color:#eef3f1;font-weight:bold;padding:5px 9px;display:flex;align-items:center;border:2px solid;border-color:#4f857e #163230 #163230 #4f857e}
 .dlg .bar .grow{flex:1}
 .dlg .pane{padding:9px;display:flex;align-items:center;gap:4px}
 .dlg img{max-width:82vw;max-height:72vh;background:#fff;border:2px solid;border-color:var(--vdark) var(--lite) var(--lite) var(--vdark)}
 .nav{font:bold 24px Tahoma;color:var(--accent);padding:0 12px;cursor:pointer;user-select:none}
 .nav:hover{color:#000}
 #lbcap{padding:5px 9px;color:#222;font-family:"Courier New",monospace;border:2px solid;border-color:var(--dark) var(--lite) var(--lite) var(--dark);background:var(--face);margin-top:3px}
</style></head><body>
<div class="app">
 <div class="hdr"><a class="home" href="../index.html">&#8962; all tasks</a><div class="name">Double Pendulum — Results Gallery</div>
  <div class="sub">Cart-actuated double inverted pendulum &mdash; each specimen swings up from deadhang; hover (or tap) a card to replay it</div></div>
 <div class="body">
  <fieldset><legend>View</legend>
   <div class="row"><b class="lbl">Show:</b><button id="varc" class="on">progression</button><button id="vall">all checkpoints</button></div>
  </fieldset>
  <fieldset id="filt"><legend>Filter &amp; sort (all checkpoints)</legend>
   <div class="row"><b class="lbl">Kind:</b><span id="kinds"></span></div>
   <div class="row" id="bar"><b class="lbl">Sort:</b><button data-sort="gen" class="on">generation</button><button data-sort="hold" class="">hold</button><button data-sort="vhold" class="">velocity</button><button data-sort="revs" class="">revolutions</button><button data-sort="effort" class="">effort</button><button data-sort="jitter" class="">jitter</button><button data-sort="peak" class="">peak cos</button></div>
  </fieldset>
  <fieldset><legend>Specimens</legend><div id="grid"></div></fieldset>
 </div>
 <div class="status"><span id="count"></span><span id="sortinfo"></span><span class="grow"></span>
  <span>single interaction site</span></div>
</div>
<div id="lb"><div class="dlg">
 <div class="bar"><span id="lbttl">specimen</span><span class="grow"></span><button id="lbx">Close</button></div>
 <div class="pane"><div class="nav" id="prev">&#10094;</div><img id="lbimg"><div class="nav" id="next">&#10095;</div></div>
 <div id="lbcap"></div>
</div></div>

el": "Generation 110", "kind": "snapshot", "gen": 110, "arc": false, "arc_rank": 999, "arc_title": "", "hold": 0.0, "vhold": 999.0, "jitter": 0.54, "effort": 0.69, "peak": 1.0, "revs": 10.5, "caption": "hold 0.00 s \u00b7 hold velocity spinning \u00b7 jitter 0.54 \u00b7 effort 0.69 \u00b7 peak cos 1.00 \u00b7 revolutions 10.5"}, {"poster": "cards/015_snapshot_gen0178.png", "gif": "gifs/015_snapshot_gen0178.gif", "label": "Generation 178", "kind": "snapshot", "gen": 178, "arc": false, "arc_rank": 999, "arc_title": "", "hold": 0.38, "vhold": 0.56, "jitter": 0.43, "effort": 0.71, "peak": 1.0, "revs": 10.3, "caption": "hold 0.38 s \u00b7 hold velocity 0.56 rad/s \u00b7 jitter 0.43 \u00b7 effort 0.71 \u00b7 peak cos 1.00 \u00b7 revolutions 10.3"}, {"poster": "cards/016_snapshot_gen0204.png", "gif": "gifs/016_snapshot_gen0204.gif", "label": "Generation 204", "kind": "snapshot", "gen": 204, "arc": true, "arc_rank": 2, "arc_title": "almost holds it", "hold": 1.41, "vhold": 0.42, "jitter": 0.19, "effort": 0.31, "peak": 1.0, "revs": 5.4, "caption": "hold 1.41 s \u00b7 hold velocity 0.42 rad/s \u00b7 jitter 0.19 \u00b7 effort 0.31 \u00b7 peak cos 1.00 \u00b7 revolutions 5.4"}, {"poster": "cards/017_snapshot_gen0246.png", "gif": "gifs/017_snapshot_gen0246.gif", "label": "Generation 246", "kind": "snapshot", "gen": 246, "arc": false, "arc_rank": 999, "arc_title": "", "hold": 1.04, "vhold": 0.59, "jitter": 0.24, "effort": 0.38, "peak": 1.0, "revs": 7.5, "caption": "hold 1.04 s \u00b7 hold velocity 0.59 rad/s \u00b7 jitter 0.24 \u00b7 effort 0.38 \u00b7 peak cos 1.00 \u00b7 revolutions 7.5"}, {"poster": "cards/018_snapshot_gen0504.png", "gif": "gifs/018_snapshot_gen0504.gif", "label": "Generation 504", "kind": "snapshot", "gen": 504, "arc": false, "arc_rank": 999, "arc_title": "", "hold": 1.51, "vhold": 0.39, "jitter": 0.55, "effort": 0.85, "peak": 1.0, "revs": 8.2, "caption": "hold 1.51 s \u00b7 hold velocity 0.39 rad/s \u00b7 jitter 0.55 \u00b7 effort 0.85 \u00b7 peak cos 1.00 \ le": "smooth control", "hold": 5.08, "vhold": 0.06, "jitter": 0.01, "effort": 0.09, "peak": 1.0, "revs": 1.3, "caption": "hold 5.08 s \u00b7 hold velocity 0.06 rad/s \u00b7 jitter 0.01 \u00b7 effort 0.09 \u00b7 peak cos 1.00 \u00b7 revolutions 1.3"}];
let kind="all",sort="gen",mode="arc",view=[],cur=0;
const grid=document.getElementById("grid"),lb=document.getElementById("lb");
const varc=document.getElementById("varc"),vall=document.getElementById("vall"),filt=document.getElementById("filt");
function setmode(m){mode=m;varc.classList.toggle("on",m==="arc");vall.classList.toggle("on",m==="all");
 filt.style.opacity=m==="arc"?".5":"1";render();}
varc.onclick=()=>setmode("arc");vall.onclick=()=>setmode("all");
const kinds=["all",...new Set(DATA.map(d=>d.kind))];
const kbox=document.getElementById("kinds");
kinds.forEach(k=>{const b=document.createElement("button");b.textContent=k;b.className=k==="all"?"on":"";
 b.onclick=()=>{kind=k;[...kbox.children].forEach(x=>x.classList.toggle("on",x.textContent===k));render()};kbox.appendChild(b)});
document.querySelectorAll("#bar button[data-sort]").forEach(b=>b.onclick=()=>{
 sort=b.dataset.sort;document.querySelectorAll("#bar button[data-sort]").forEach(x=>x.classList.toggle("on",x===b));render()});
function play(card,d){if(!d.gif)return;const g=card.querySelector(".gif");g.src=d.gif+"?t="+(Date.now());card.classList.add("play");}
function stop(card){card.classList.remove("play");}
function render(){
 const ASC=new Set(["gen","vhold","effort","jitter"]);   // lower is calmer/cheaper -> first
 if(mode==="arc"){
  view=DATA.filter(d=>d.arc).sort((a,b)=>a.arc_rank-b.arc_rank);   // narrative order
 }else{
  view=DATA.filter(d=>kind==="all"||d.kind===kind);
  view.sort((a,b)=>ASC.has(sort)?a[sort]-b[sort]:b[sort]-a[sort]);
 }
 grid.innerHTML="";
 view.forEach((d,i)=>{const c=document.createElement("div");c.className="card"+(d.arc?" arc":"");
  c.innerHTML=`<div class="frame"><img src="${d.poster}" loading="lazy"><img class="gif" alt=""></div>`+
   `<div class="meta"><b>${d.label}</b><div class="nums">${d.caption}</div></div>`;
  c.onmouseenter=()=>play(c,d);c.onmouseleave=()=>stop(c);
  c.onclick=()=>show(i);grid.appendChild(c)});
 document.getElementById("count").textContent=view.length+" of "+DATA.length+" specimens";
 document.getElementById("sortinfo").textContent=mode==="arc"?"behavioural progression (swing-up → catch → hold)"
   :("sorted by "+sort+(kind==="all"?"":" · kind: "+kind));}
if(!DATA.some(d=>d.arc))setmode("all"); else setmode("arc");
function show(i){cur=i;const d=view[i];document.getElementById("lbimg").src=(d.gif||d.poster)+(d.gif?"?t="+Date.now():"");
 document.getElementById("lbttl").textContent=d.label;
 document.getElementById("lbcap").textContent=d.caption;
 lb.style.display="flex"}
function step(n){cur=(cur+n+view.length)%view.length;show(cur)}
function closeLb(){lb.style.display="none"}
document.getElementById("next").onclick=e=>{e.stopPropagation();step(1)};
document.getElementById("prev").onclick=e=>{e.stopPropagation();step(-1)};
document.getElementById("lbx").onclick=e=>{e.stopPropagation();closeLb()};
lb.onclick=closeLb;document.querySelector(".dlg").onclick=e=>e.stopPropagation();
document.addEventListener("keydown",e=>{if(lb.style.display!=="flex")return;
 if(e.key==="ArrowRight")step(1);else if(e.key==="ArrowLeft")step(-1);else if(e.key==="Escape")closeLb()});
render();
</script></body></html>
